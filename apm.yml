name: fanhub-workshop
version: 1.0.0
description: >
  Complete GitHub Copilot configuration for the FanHub Breaking Bad workshop.
  Includes instructions, prompts, skills, agents, and MCP servers across modules 01–06.
  Install into a freshly-cloned FanHub repo to get everything participants
  build from scratch — delivered in one command.
author: MSBart2
license: Apache-2.0
target: all

scripts:
  install-docs: "curl -fsSL --create-dirs -o dotnet/docs/architecture.md https://raw.githubusercontent.com/MSBart2/apm/main/docs/architecture.md && curl -fsSL --create-dirs -o dotnet/docs/breaking-bad-universe.md https://raw.githubusercontent.com/MSBart2/apm/main/docs/breaking-bad-universe.md && curl -fsSL --create-dirs -o .github/copilot-instructions.md https://raw.githubusercontent.com/MSBart2/apm/main/.apm/instructions/copilot-instructions.instructions.md"
  uninstall-docs: 'pwsh -NoProfile -Command "Remove-Item -Force -ErrorAction SilentlyContinue ''dotnet/docs/architecture.md'',''dotnet/docs/breaking-bad-universe.md'',''.github/copilot-instructions.md''"'

dependencies:
  mcp:
    # Module 05 — FanHub REST API (requires dotnet backend running on :5265)
    - name: fanhub-api
      registry: false
      transport: stdio
      command: node
      args: ["${workspaceFolder}/mcp-servers/fanhub-api-server.js"]
      env:
        FANHUB_API_URL: "http://localhost:5265"
    # Module 05 — Direct SQLite access via fanhub.db
    - name: fanhub-db
      registry: false
      transport: stdio
      command: npx
      args: ["-y", "mcp-sqlite", "${workspaceFolder}/dotnet/Backend/fanhub.db"]
