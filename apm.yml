name: fanhub-workshop
version: 1.0.0
description: >
  Complete GitHub Copilot configuration for the FanHub Breaking Bad workshop.
  Includes instructions, prompts, skills, agents, and MCP server setup across modules 01–06.
  Install into a freshly-cloned FanHub repo to get everything participants
  build from scratch — delivered in one command.
author: MSBart2
license: Apache-2.0
target: all

scripts:
  install-docs: "curl -fsSL --create-dirs -o fanhubapm/architecture.md https://raw.githubusercontent.com/MSBart2/apm/main/fanhubapm/architecture.md && curl -fsSL --create-dirs -o fanhubapm/breaking-bad-universe.md https://raw.githubusercontent.com/MSBart2/apm/main/fanhubapm/breaking-bad-universe.md"
  setup-mcp: "node ${workspaceFolder}/apm_modules/MSBart2/apm/scripts/merge-mcp.js"
  uninstall-docs: 'node -e "const fs=require(''fs'');[''fanhubapm/architecture.md'',''fanhubapm/breaking-bad-universe.md''].forEach(f=>{try{fs.unlinkSync(f)}catch(e){}})"'

dependencies:
  apm: []
  mcp: []
